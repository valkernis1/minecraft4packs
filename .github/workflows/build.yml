name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: mvn package -q
      - uses: actions/upload-artifact@v3
        with:
          name: pack-order
          path: target/pack-order-1.0.jar
